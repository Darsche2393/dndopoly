function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ═══════════════════════════════════════════════════════════
// SOUND EFFECTS (Web Audio API — no external files)
// ═══════════════════════════════════════════════════════════
const _sfxCtx = (()=>{ try{ return new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } })();
function _sfxResume(){ if(_sfxCtx && _sfxCtx.state==='suspended') _sfxCtx.resume(); }

function sfxDiceRoll(){
  if(!_sfxCtx) return;
  _sfxResume();
  const t = _sfxCtx.currentTime;
  // Multiple clack sounds in quick succession
  [0, 0.08, 0.18, 0.30, 0.44, 0.54].forEach((delay, i) => {
    const osc = _sfxCtx.createOscillator();
    const gain = _sfxCtx.createGain();
    const filter = _sfxCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 180 + i * 30;
    filter.Q.value = 0.5;
    osc.type = 'square';
    osc.frequency.value = 90 + Math.random()*60;
    gain.gain.setValueAtTime(0, t+delay);
    gain.gain.linearRampToValueAtTime(0.18 - i*0.02, t+delay+0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t+delay+0.08);
    osc.connect(filter); filter.connect(gain); gain.connect(_sfxCtx.destination);
    osc.start(t+delay); osc.stop(t+delay+0.1);
  });
  // Final thud
  const buf = _sfxCtx.createBuffer(1, _sfxCtx.sampleRate*0.15, _sfxCtx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,3)*0.4;
  const src = _sfxCtx.createBufferSource();
  src.buffer=buf;
  const g2=_sfxCtx.createGain();
  g2.gain.value=0.6;
  src.connect(g2); g2.connect(_sfxCtx.destination);
  src.start(t+0.58);
}

function sfxSuccess(){
  if(!_sfxCtx) return;
  _sfxResume();
  const t = _sfxCtx.currentTime;
  [0,0.12,0.22].forEach((delay,i)=>{
    const osc=_sfxCtx.createOscillator(), g=_sfxCtx.createGain();
    osc.type='sine'; osc.frequency.value=[440,554,659][i];
    g.gain.setValueAtTime(0,t+delay); g.gain.linearRampToValueAtTime(0.15,t+delay+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.25);
    osc.connect(g); g.connect(_sfxCtx.destination);
    osc.start(t+delay); osc.stop(t+delay+0.3);
  });
}

function sfxFailure(){
  if(!_sfxCtx) return;
  _sfxResume();
  const t = _sfxCtx.currentTime;
  [0,0.15].forEach((delay,i)=>{
    const osc=_sfxCtx.createOscillator(), g=_sfxCtx.createGain();
    osc.type='sawtooth'; osc.frequency.value=[220,180][i];
    g.gain.setValueAtTime(0,t+delay); g.gain.linearRampToValueAtTime(0.12,t+delay+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.3);
    osc.connect(g); g.connect(_sfxCtx.destination);
    osc.start(t+delay); osc.stop(t+delay+0.35);
  });
}

function sfxCritSuccess(){
  if(!_sfxCtx) return;
  _sfxResume();
  const t = _sfxCtx.currentTime;
  [0,0.1,0.2,0.3,0.4].forEach((delay,i)=>{
    const osc=_sfxCtx.createOscillator(), g=_sfxCtx.createGain();
    osc.type='sine'; osc.frequency.value=[440,523,659,784,1047][i];
    g.gain.setValueAtTime(0,t+delay); g.gain.linearRampToValueAtTime(0.18,t+delay+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.35);
    osc.connect(g); g.connect(_sfxCtx.destination);
    osc.start(t+delay); osc.stop(t+delay+0.4);
  });
}

function sfxCritFail(){
  if(!_sfxCtx) return;
  _sfxResume();
  const t = _sfxCtx.currentTime;
  const osc=_sfxCtx.createOscillator(), g=_sfxCtx.createGain();
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(300,t);
  osc.frequency.exponentialRampToValueAtTime(60,t+0.6);
  g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.65);
  osc.connect(g); g.connect(_sfxCtx.destination);
  osc.start(t); osc.stop(t+0.7);
}
function log(msg, cls=''){
  const el=document.getElementById('game-log');
  const div=document.createElement('div');
  div.className=`log-entry ${cls}`;
  div.textContent=msg;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}
