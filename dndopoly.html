<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DnDopoly — Realm of Fortune</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a1a;--board-bg:#0e1f0e;--parchment:#f4e4b0;--gold:#ffd700;
  --text:#e8d5a3;--dim:#9a8a6a;--shadow:rgba(0,0,0,0.85);
  --purple:#8e44ad;--light-blue:#2980b9;--pink:#c0392b;--orange:#d35400;
  --red:#922b21;--yellow:#b7950b;--green:#1e8449;--dark-blue:#1a3a6b;
  --corner:110px;--side:66px;
}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',serif;min-height:100vh;overflow-x:hidden;}

/* ===== SETUP SCREEN ===== */
#setup-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;background:radial-gradient(ellipse at center,#0d1f3c 0%,#0a0a1a 70%);}
.logo{font-family:'Cinzel Decorative',cursive;font-size:3.5rem;color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,0.5);margin-bottom:8px;text-align:center;}
.logo-sub{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--dim);letter-spacing:4px;margin-bottom:50px;text-align:center;}
.setup-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.3);border-radius:12px;padding:36px;width:100%;max-width:560px;}
.setup-card h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.4rem;margin-bottom:24px;text-align:center;letter-spacing:2px;}
.player-row{display:flex;gap:12px;align-items:center;margin-bottom:14px;padding:12px;background:rgba(0,0,0,0.3);border-radius:8px;border:1px solid rgba(255,255,255,0.1);}
.player-row label{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--dim);width:70px;flex-shrink:0;}
.player-row input[type=text]{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,215,0,0.3);border-radius:6px;padding:8px 12px;color:var(--text);font-family:'Crimson Text',serif;font-size:1rem;outline:none;}
.player-row input[type=text]:focus{border-color:var(--gold);}
.color-pick{display:flex;gap:6px;}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.2s;}
.color-dot.selected{border-color:#fff;transform:scale(1.2);}
.player-row.inactive{opacity:0.35;}
.setup-controls{display:flex;gap:12px;margin:20px 0 0;}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-family:'Cinzel',serif;font-size:0.95rem;letter-spacing:1px;transition:all 0.2s;}
.btn-gold{background:linear-gradient(135deg,#b8860b,#ffd700,#b8860b);color:#1a0a00;font-weight:700;}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,215,0,0.4);}
.btn-outline{background:transparent;border:1px solid rgba(255,215,0,0.4);color:var(--gold);}
.btn-outline:hover{background:rgba(255,215,0,0.1);}
.btn-danger{background:rgba(180,40,40,0.7);border:1px solid rgba(255,80,80,0.4);color:#ffaaaa;}
.btn-sm{padding:6px 14px;font-size:0.8rem;}
.player-count-row{display:flex;gap:8px;margin-bottom:20px;justify-content:center;}
.count-btn{padding:8px 18px;border:1px solid rgba(255,215,0,0.3);background:rgba(255,215,0,0.05);color:var(--dim);border-radius:20px;cursor:pointer;font-family:'Cinzel',serif;font-size:0.85rem;transition:all 0.2s;}
.count-btn.active{background:rgba(255,215,0,0.2);border-color:var(--gold);color:var(--gold);}

/* ===== GAME SCREEN ===== */
#game-screen{display:none;flex-direction:column;align-items:center;padding:16px;min-height:100vh;}
.game-layout{display:flex;gap:16px;align-items:flex-start;width:100%;max-width:1300px;}

/* ===== BOARD ===== */
.board-wrap{position:relative;flex-shrink:0;}
.board{
  display:grid;
  grid-template-columns:var(--corner) repeat(9,var(--side)) var(--corner);
  grid-template-rows:var(--corner) repeat(9,var(--side)) var(--corner);
  border:3px solid #5a4a2a;
  background:#1a3a1a;
  box-shadow:0 0 40px rgba(0,0,0,0.8),inset 0 0 60px rgba(0,0,0,0.4);
}
.board-center{grid-column:2/11;grid-row:2/11;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0a1a10 0%,#060e0a 100%);position:relative;overflow:hidden;}
.center-art{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}

/* ===== TILE BASE ===== */
.tile{position:relative;border:1px solid #2a3a2a;background:#0c1a0c;cursor:pointer;overflow:hidden;
  transition:filter 0.15s,box-shadow 0.15s;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0;}
.tile:hover{filter:brightness(1.25);z-index:5;}

/* ===== CORNER TILES ===== */
.tile.corner{align-items:center;justify-content:center;background:#0a1a0a;border:1px solid #4a6a2a;}
.corner-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;padding:6px;gap:3px;}
.corner-icon{font-size:1.8rem;line-height:1;}
.corner-title{font-family:'Cinzel',serif;font-size:0.52rem;text-align:center;color:var(--gold);letter-spacing:0.5px;line-height:1.3;text-transform:uppercase;}
.corner-sub{font-size:0.44rem;text-align:center;color:var(--dim);line-height:1.2;}

/* ===== PROPERTY TILES ===== */
.prop-tile{background:#16110a;justify-content:flex-start;}
.prop-tile .tile-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px 2px 1px;gap:1px;overflow:hidden;width:100%;}
.tile-name{font-size:0.4rem;text-align:center;color:#d8c88a;line-height:1.2;word-break:break-word;font-family:'Cinzel',serif;letter-spacing:0.2px;}
.tile-price{font-size:0.42rem;color:var(--gold);text-align:center;}

/* Color bands — thicker, face board center */
.color-band{flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.tile.bottom .color-band{width:100%;height:24px;order:-1;}
.tile.top    .color-band{width:100%;height:24px;order:2;}
.tile.left   .color-band{height:100%;width:24px;position:absolute;right:0;top:0;flex-direction:column;}
.tile.right  .color-band{height:100%;width:24px;position:absolute;left:0;top:0;flex-direction:column;}
.band-icon{font-size:0.85rem;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.7));}

/* Building pip row */
.build-pips{display:flex;gap:2px;position:absolute;bottom:2px;left:50%;transform:translateX(-50%);z-index:2;}
.build-pip{width:5px;height:5px;border-radius:1px;background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.2);}
.build-pip.filled{background:#ffd700;border-color:#b8860b;box-shadow:0 0 4px rgba(255,215,0,0.6);}
.build-pip.hotel{background:#e74c3c;border-color:#c0392b;border-radius:50%;box-shadow:0 0 4px rgba(231,76,60,0.7);}

/* Owner glow — applied via JS */
.tile.owned-p0{box-shadow:inset 0 0 0 3px #e74c3c,0 0 12px rgba(231,76,60,0.6);}
.tile.owned-p1{box-shadow:inset 0 0 0 3px #3498db,0 0 12px rgba(52,152,219,0.6);}
.tile.owned-p2{box-shadow:inset 0 0 0 3px #2ecc71,0 0 12px rgba(46,204,113,0.6);}
.tile.owned-p3{box-shadow:inset 0 0 0 3px #f39c12,0 0 12px rgba(243,156,18,0.6);}
.tile.owned-p4{box-shadow:inset 0 0 0 3px #9b59b6,0 0 12px rgba(155,89,182,0.6);}
.tile.owned-p5{box-shadow:inset 0 0 0 3px #1abc9c,0 0 12px rgba(26,188,156,0.6);}

/* Owner flag inside tile */
.owner-flag{
  position:absolute;top:3px;right:3px;
  width:14px;height:14px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.7);
  font-size:7px;display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-weight:700;color:#fff;
  z-index:5;box-shadow:0 1px 4px rgba(0,0,0,0.8);
  pointer-events:none;
}

/* Rent toast */
.rent-toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#1a0808,#2a1010);
  border:2px solid #e74c3c;border-radius:12px;
  padding:18px 28px;text-align:center;z-index:9999;
  font-family:'Cinzel',serif;color:#ffaaaa;
  box-shadow:0 0 40px rgba(231,76,60,0.5);
  animation:toastIn 0.3s ease;pointer-events:none;
}
.rent-toast .rent-amt{font-size:2rem;color:#ff6666;font-weight:700;}
.rent-toast .rent-from{font-size:0.8rem;color:var(--dim);margin-top:4px;}
@keyframes toastIn{from{transform:translate(-50%,-50%) scale(0.7);opacity:0;}to{transform:translate(-50%,-50%) scale(1);opacity:1;}}

/* Build panel */
#build-panel{background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.25);border-radius:10px;padding:14px;display:none;}
#build-panel .build-panel-title{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold);margin-bottom:10px;letter-spacing:1px;}
.build-prop-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:6px 8px;background:rgba(0,0,0,0.3);border-radius:6px;}
.build-prop-row .bpr-name{flex:1;font-size:0.78rem;color:var(--text);}
.build-prop-row .bpr-pips{display:flex;gap:2px;}
.build-prop-row .bpr-pip{width:7px;height:7px;border-radius:50%;background:#333;border:1px solid #555;}
.build-prop-row .bpr-pip.on{background:var(--gold);border-color:#ffd700;}
.build-prop-row .bpr-btn{font-size:0.7rem;padding:3px 8px;}

/* Sidebar toggle */
#sidebar-toggle{
  position:absolute;right:-14px;top:50%;transform:translateY(-50%);
  width:14px;height:48px;background:rgba(255,215,0,0.15);
  border:1px solid rgba(255,215,0,0.3);border-radius:0 6px 6px 0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:0.6rem;color:var(--gold);z-index:30;transition:background 0.2s;
}
#sidebar-toggle:hover{background:rgba(255,215,0,0.3);}
.sidebar.collapsed{display:none;}

/* Mortgage badge */
.mortgaged-badge{
  position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(0,0,0,0.6) 0,rgba(0,0,0,0.6) 4px,rgba(80,30,30,0.4) 4px,rgba(80,30,30,0.4) 8px);
  display:flex;align-items:center;justify-content:center;z-index:4;pointer-events:none;
}
.mortgaged-badge span{font-size:0.55rem;color:#ff8888;font-family:'Cinzel',serif;font-weight:700;letter-spacing:1px;writing-mode:vertical-rl;text-orientation:upright;background:rgba(0,0,0,0.7);padding:2px;border-radius:2px;}

/* ===== SPECIAL TILE TYPES ===== */
.tile.chance-tile   {background:#130a1f;}
.tile.community-tile{background:#1a1500;}
.tile.railroad-tile {background:#0a0a0d;}
.tile.utility-tile  {background:#081420;}
.tile.tax-tile      {background:#1f0a08;}
.special-icon{font-size:1.1rem;text-align:center;display:block;margin-bottom:1px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.8));}
.special-label{font-size:0.38rem;text-align:center;color:var(--dim);font-family:'Cinzel',serif;letter-spacing:0.3px;line-height:1.2;}

/* ===== TILE-INFO MODAL ===== */
#tile-info-modal .modal-box{background:linear-gradient(150deg,#0f1a10,#1a100f);max-width:480px;padding:24px;}
.tinfo-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.tinfo-color-swatch{width:14px;height:52px;border-radius:4px;flex-shrink:0;}
.tinfo-title{font-family:'Cinzel Decorative',cursive;font-size:1.3rem;color:var(--gold);line-height:1.2;}
.tinfo-group{font-family:'Cinzel',serif;font-size:0.7rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.tinfo-owner-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-family:'Cinzel',serif;font-size:0.72rem;margin-top:6px;}
.tinfo-section{margin-bottom:14px;}
.tinfo-section-title{font-family:'Cinzel',serif;font-size:0.7rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(255,215,0,0.15);}
.rent-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
.rent-table td{padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.05);}
.rent-table td:first-child{color:var(--dim);}
.rent-table td:last-child{color:var(--gold);text-align:right;font-family:'Cinzel',serif;}
.rent-table tr.current-rent td{color:#88ff88;font-weight:bold;}
.rent-table tr.current-rent td:first-child{color:#88ff88;}
.tinfo-building-row{display:flex;gap:6px;margin-top:8px;}
.tinfo-pip{width:28px;height:28px;border-radius:4px;border:1px solid rgba(255,215,0,0.25);background:rgba(255,215,0,0.05);display:flex;align-items:center;justify-content:center;font-size:0.9rem;}
.tinfo-pip.filled{background:rgba(255,215,0,0.2);border-color:rgba(255,215,0,0.6);}
.tinfo-stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.85rem;}
.tinfo-stat-row span:first-child{color:var(--dim);}
.tinfo-stat-row span:last-child{color:var(--text);font-family:'Cinzel',serif;}

/* Token */
.token{
  position:absolute;width:26px;height:26px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,0.85);z-index:25;
  transition:all 0.45s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 3px 12px rgba(0,0,0,0.9),0 0 10px currentColor;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:0.65rem;font-weight:700;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.9);
  cursor:default;
}
.token.active-token{
  box-shadow:0 3px 12px rgba(0,0,0,0.9),0 0 18px currentColor,0 0 0 3px rgba(255,215,0,0.7);
  transform:translateY(-3px) scale(1.15);
  z-index:26;
}

/* ===== SIDEBAR ===== */
.sidebar{flex:1;min-width:260px;max-width:320px;display:flex;flex-direction:column;gap:12px;}
.player-card{border-radius:10px;padding:14px;border:2px solid transparent;transition:all 0.3s;cursor:pointer;}
.player-card:hover{transform:translateY(-2px);filter:brightness(1.15);}
.player-card.active-turn{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,0.3);}
.player-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.player-token-icon{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);flex-shrink:0;}
.player-name-label{font-family:'Cinzel',serif;font-size:0.95rem;font-weight:600;}
.player-gold{font-size:1.3rem;color:var(--gold);font-family:'Cinzel',serif;margin-bottom:6px;}
.player-gold span{font-size:0.7rem;color:var(--dim);margin-left:4px;}
.player-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.tag{font-size:0.65rem;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,0.1);color:var(--dim);font-family:'Cinzel',serif;}
.tag.gear-tag{background:rgba(100,60,200,0.3);color:#c8a8ff;}
.tag.potion-tag{background:rgba(60,160,60,0.3);color:#a8ffa8;}
.tag.jail-tag{background:rgba(180,40,40,0.3);color:#ffaaaa;}
.in-jail-badge{font-size:0.65rem;color:#ff8888;font-family:'Cinzel',serif;}
.prop-list{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px;}
.prop-dot{width:10px;height:10px;border-radius:2px;}

/* ===== DICE & CONTROLS ===== */
.controls-panel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,215,0,0.2);border-radius:10px;padding:16px;}
.turn-banner{font-family:'Cinzel',serif;font-size:0.9rem;color:var(--gold);text-align:center;margin-bottom:12px;min-height:20px;}
.dice-row{display:flex;gap:10px;justify-content:center;margin-bottom:12px;}
.die{width:48px;height:48px;border-radius:8px;background:#1a1a1a;border:2px solid #5a4a2a;display:flex;align-items:center;justify-content:center;font-size:1.8rem;transition:transform 0.1s;}
.die.rolling{animation:spin 0.4s ease-out;}
@keyframes spin{0%{transform:rotate(0)scale(1)}50%{transform:rotate(180deg)scale(1.2)}100%{transform:rotate(360deg)scale(1)}}
.control-btns{display:flex;gap:8px;flex-direction:column;}

/* ===== GAME LOG ===== */
.log-panel{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;height:140px;overflow-y:auto;font-size:0.8rem;line-height:1.6;}
.log-entry{border-bottom:1px solid rgba(255,255,255,0.05);padding:2px 0;color:var(--dim);}
.log-entry.highlight{color:var(--gold);}
.log-entry.danger{color:#ff8888;}
.log-entry.success{color:#88ff88;}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:linear-gradient(160deg,#0d1a0d,#1a0d1a);border:2px solid rgba(255,215,0,0.5);border-radius:16px;padding:32px;max-width:580px;width:100%;box-shadow:0 0 60px rgba(0,0,0,0.9),0 0 30px rgba(255,215,0,0.15);max-height:90vh;overflow-y:auto;}
.modal-box.card-style{background:linear-gradient(160deg,#1a1200,#0d0d00);border-color:rgba(255,215,0,0.6);}
.modal-title{font-family:'Cinzel Decorative',cursive;font-size:1.5rem;color:var(--gold);margin-bottom:6px;text-align:center;}
.modal-subtitle{font-family:'Cinzel',serif;font-size:0.8rem;color:var(--dim);text-align:center;letter-spacing:3px;margin-bottom:20px;text-transform:uppercase;}
.modal-story{font-size:1.05rem;line-height:1.8;color:#d8c890;margin-bottom:24px;font-style:italic;}
.modal-choices{display:flex;flex-direction:column;gap:10px;}
.choice-btn{padding:12px 18px;border:1px solid rgba(255,215,0,0.3);background:rgba(255,215,0,0.05);border-radius:8px;cursor:pointer;color:var(--text);font-family:'Crimson Text',serif;font-size:1rem;text-align:left;transition:all 0.2s;line-height:1.4;}
.choice-btn:hover{background:rgba(255,215,0,0.15);border-color:var(--gold);transform:translateX(4px);}
.choice-btn .choice-cost{display:block;font-size:0.75rem;color:var(--dim);margin-top:3px;}
.choice-btn .choice-risk{display:block;font-size:0.7rem;color:#ff9944;margin-top:2px;}
.modal-result{padding:16px;border-radius:8px;margin-bottom:16px;text-align:center;font-size:1.1rem;line-height:1.6;}
.modal-result.success{background:rgba(40,160,40,0.2);border:1px solid rgba(40,160,40,0.4);color:#aaffaa;}
.modal-result.failure{background:rgba(160,40,40,0.2);border:1px solid rgba(160,40,40,0.4);color:#ffaaaa;}
.modal-result.neutral{background:rgba(100,100,40,0.2);border:1px solid rgba(255,215,0,0.3);color:#ffd780;}
.dice-display{font-size:3rem;text-align:center;margin:10px 0;}
.dice-display.rolling-anim{animation:diceRoll 0.5s ease-out;}
@keyframes diceRoll{0%{transform:rotate(-20deg) scale(0.8)}50%{transform:rotate(15deg) scale(1.3)}100%{transform:rotate(0) scale(1)}}

/* Shop modal */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.shop-item{padding:12px;border:1px solid rgba(255,215,0,0.2);border-radius:8px;background:rgba(255,255,255,0.03);cursor:pointer;transition:all 0.2s;}
.shop-item:hover{border-color:var(--gold);background:rgba(255,215,0,0.08);}
.shop-item-name{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold);margin-bottom:4px;}
.shop-item-price{font-size:0.75rem;color:var(--dim);}
.shop-item-effect{font-size:0.72rem;color:#c0a870;margin-top:4px;line-height:1.3;}
.shop-item.cant-afford{opacity:0.4;cursor:not-allowed;}
.shop-item.already-owned{border-color:rgba(100,200,100,0.4);background:rgba(100,200,100,0.05);}

/* Win screen */
#win-screen{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;align-items:center;justify-content:center;flex-direction:column;}
.win-title{font-family:'Cinzel Decorative',cursive;font-size:4rem;color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,0.8);margin-bottom:20px;text-align:center;}
.win-sub{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--text);margin-bottom:40px;}

/* Property purchase bar */
.purchase-bar{display:flex;gap:10px;justify-content:center;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,215,0,0.2);}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);}
::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.3);border-radius:3px;}

.section-label{font-family:'Cinzel',serif;font-size:0.65rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}

<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup-screen">
  <div class="logo">DnDopoly</div>
  <div class="logo-sub">⚔ REALM OF FORTUNE ⚔</div>
  <div class="setup-card">
    <h2>ASSEMBLE YOUR PARTY</h2>
    <div class="section-label" style="text-align:center;margin-bottom:14px;">Number of Adventurers</div>
    <div class="player-count-row">
      <button class="count-btn" onclick="setPlayerCount(2)">2</button>
      <button class="count-btn active" onclick="setPlayerCount(3)">3</button>
      <button class="count-btn" onclick="setPlayerCount(4)">4</button>
    </div>
    <div id="player-setup-rows"></div>
    <div class="setup-controls">
      <button class="btn btn-gold" style="flex:1;font-size:1.1rem;padding:14px;" onclick="startGame()">⚔ BEGIN THE QUEST</button>
    </div>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen">
  <div class="game-layout">
    <!-- Board -->
    <div class="board-wrap" style="position:relative;">
      <div class="board" id="game-board">
        <!-- Tiles injected by JS -->
        <div class="board-center" id="board-center">
          <div class="center-art" id="center-art"></div>
        </div>
      </div>
      <div id="token-layer" style="position:absolute;inset:0;pointer-events:none;z-index:20;"></div>
      <!-- Sidebar toggle tab -->
      <div id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">❯</div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="main-sidebar">
      <div class="section-label">Adventurers</div>
      <div id="player-cards"></div>
      <div id="build-panel"></div>
      <div class="controls-panel">
        <div class="turn-banner" id="turn-banner">Loading...</div>
        <div class="dice-row">
          <div class="die" id="die1">⚀</div>
          <div class="die" id="die2">⚀</div>
        </div>
        <div class="control-btns">
          <button class="btn btn-gold" id="roll-btn" onclick="rollDice()">🎲 Roll the Dice</button>
          <button class="btn btn-outline btn-sm" id="jail-pay-btn" style="display:none" onclick="payJailFine()">⛓ Pay 50g to Escape Jail</button>
        </div>
      </div>
      <div class="section-label">Chronicle</div>
      <div class="log-panel" id="game-log"></div>
    </div>
  </div>
</div>

<!-- ===== EVENT MODAL ===== -->
<div class="modal-overlay hidden" id="event-modal">
  <div class="modal-box" id="event-modal-box">
    <div class="modal-title" id="event-title"></div>
    <div class="modal-subtitle" id="event-subtitle"></div>
    <div class="modal-story" id="event-story"></div>
    <div id="event-result-area"></div>
    <div class="modal-choices" id="event-choices"></div>
    <div class="purchase-bar" id="purchase-bar" style="display:none"></div>
  </div>
</div>

<!-- ===== CARD MODAL ===== -->
<div class="modal-overlay hidden" id="card-modal">
  <div class="modal-box card-style">
    <div class="modal-title" id="card-title"></div>
    <div class="modal-subtitle" id="card-type-label"></div>
    <div class="modal-story" id="card-story"></div>
    <div id="card-result" class="modal-result neutral" style="display:none"></div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-gold" onclick="closeCardModal()">Continue</button>
    </div>
  </div>
</div>

<!-- ===== TILE INFO MODAL ===== -->
<div class="modal-overlay hidden" id="tile-info-modal" onclick="if(event.target===this)closeTileInfo()">
  <div class="modal-box" style="background:linear-gradient(150deg,#0f1a10,#1a100f);max-width:460px;padding:24px;">
    <div class="tinfo-header">
      <div class="tinfo-color-swatch" id="tinfo-swatch"></div>
      <div>
        <div class="tinfo-title" id="tinfo-title"></div>
        <div class="tinfo-group" id="tinfo-group"></div>
        <div id="tinfo-owner-wrap"></div>
      </div>
    </div>
    <div id="tinfo-body"></div>
    <div style="text-align:center;margin-top:18px;display:flex;gap:10px;justify-content:center;" id="tinfo-actions"></div>
  </div>
</div>

<!-- ===== PLAYER INFO MODAL ===== -->
<div class="modal-overlay hidden" id="player-info-modal" onclick="if(event.target===this)closePlayerInfo()">
  <div class="modal-box" style="background:linear-gradient(150deg,#0a0a1a,#101828);max-width:500px;padding:24px;">
    <div id="pinfo-header" style="display:flex;align-items:center;gap:14px;margin-bottom:18px;border-bottom:1px solid rgba(255,215,0,0.15);padding-bottom:14px;"></div>
    <div id="pinfo-body"></div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-outline btn-sm" onclick="closePlayerInfo()">Close</button>
    </div>
  </div>
</div>

<!-- ===== WIN SCREEN ===== -->
<div id="win-screen">
  <div class="win-title" id="win-title">VICTORY!</div>
  <div class="win-sub" id="win-sub"></div>
  <button class="btn btn-gold" style="font-size:1.1rem;padding:16px 40px;" onclick="location.reload()">⚔ Play Again</button>
</div>

// GAME STATE
// ═══════════════════════════════════════════════════════════
let G = {
  players: [],
  currentIdx: 0,
  phase: 'setup',
  tileOwners: {},      // tileId -> playerIdx
  tilePrices: {},      // tileId -> current price (can be modified by events)
  deckFates: [],
  deckTreasure: [],
  freeParking: 0,      // gold accumulated at free parking
  turnPhase: 'roll',   // 'roll' | 'action' | 'end'
  doublesCount: 0,
  doublesPending: false,
  mortgaged: {},
  actionPending: null,
};

// ═══════════════════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════════════════
let setupPlayerCount = 3;
let setupPlayers = [
  {name:'Aragorn', color:0},
  {name:'Gandalf', color:1},
  {name:'Legolas', color:2},
  {name:'Gimli',   color:3},
];

function setPlayerCount(n){
  setupPlayerCount = n;
  document.querySelectorAll('.count-btn').forEach((b,i)=>b.classList.toggle('active', i+2===n));
  renderSetupRows();
}

function renderSetupRows(){
  const c = document.getElementById('player-setup-rows');
  c.innerHTML = '';
  for(let i=0;i<4;i++){
    const active = i < setupPlayerCount;
    const p = setupPlayers[i];
    c.innerHTML += `
    <div class="player-row ${active?'':'inactive'}" id="prow-${i}">
      <label>Player ${i+1}</label>
      <input type="text" id="pname-${i}" value="${p.name}" placeholder="Name" ${active?'':'disabled'}>
      <div class="color-pick" id="cpick-${i}">
        ${PLAYER_COLORS.map((col,ci)=>`<div class="color-dot ${p.color===ci?'selected':''}" style="background:${col}" onclick="setColor(${i},${ci})"></div>`).join('')}
      </div>
    </div>`;
  }
}

function setColor(playerIdx, colorIdx){
  setupPlayers[playerIdx].color = colorIdx;
  renderSetupRows();
}

function startGame(){
  G.players = [];
  for(let i=0;i<setupPlayerCount;i++){
    const nameEl = document.getElementById(`pname-${i}`);
    G.players.push({
      idx: i,
      name: nameEl ? nameEl.value || `Player ${i+1}` : `Player ${i+1}`,
      color: PLAYER_COLORS[setupPlayers[i].color],
      gold: 2000,
      pos: 0,
      gear: null,
      potions: [],
      inJail: false,
      jailTurns: 0,
      skipTurns: 0,
      curse: 0,
      curseAmount: 0,
      bankrupt: false,
    });
  }
  G.tileOwners = {};
  G.buildings = {};
  G.tilePrices = {};
  TILES.forEach(t=>{ if(t.price) G.tilePrices[t.id]=t.price; });
  G.deckFates = shuffle([...FATES_WHISPER]);
  G.deckTreasure = shuffle([...TREASURE_TROVE]);
  G.freeParking = 0;
  G.currentIdx = 0;
  G.doublesCount = 0;
  G.doublesPending = false;
  G.mortgaged = {};
  G.phase = 'playing';
  G.turnPhase = 'roll';

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  buildBoard();
  buildCenterArt();
  renderPlayerCards();
  renderTokens();
  startTurn();
  log('⚔ The quest begins! May fortune favor the bold.','highlight');
}

// BOARD BUILDING
// ═══════════════════════════════════════════════════════════
function buildBoard(){
  const board = document.getElementById('game-board');
  [...board.querySelectorAll('.tile')].forEach(t=>t.remove());

  TILES.forEach(tile=>{
    const el = document.createElement('div');
    el.className = `tile ${tile.side||''}`;
    el.id = `tile-${tile.id}`;
    el.style.gridRow = tile.gridRow;
    el.style.gridColumn = tile.gridCol;
    el.onclick = ()=>showTileInfo(tile.id);

    const side = tile.side||'';

    if(tile.type==='property'){
      el.classList.add('prop-tile');
      el.style.background = COLOR_BG[tile.color]||'#111';
      const icon = GROUP_ICONS[tile.color]||'🏠';
      const hex  = COLOR_HEX[tile.color]||'#555';
      // Color band with icon (faces board center based on side)
      const band = document.createElement('div');
      band.className = 'color-band';
      band.style.background = `linear-gradient(135deg, ${hex}dd, ${hex})`;
      band.innerHTML = `<span class="band-icon">${icon}</span>`;
      el.appendChild(band);
      // Body
      const body = document.createElement('div');
      body.className = 'tile-body';
      body.innerHTML = `<div class="tile-name">${tile.name}</div><div class="tile-price">${tile.price}g</div>`;
      el.appendChild(body);
      // 5 building pip slots
      const pips = document.createElement('div');
      pips.className = 'build-pips';
      pips.id = `pips-${tile.id}`;
      for(let i=0;i<5;i++) pips.innerHTML+=`<div class="build-pip" id="pip-${tile.id}-${i}"></div>`;
      el.appendChild(pips);

    } else if(tile.type==='railroad'){
      el.classList.add('railroad-tile');
      const icon = RAILROAD_ICONS[tile.id]||'🚂';
      el.innerHTML=`<span class="special-icon">${icon}</span><div class="special-label">${shortName(tile.name)}</div><div class="tile-price" style="font-size:0.38rem;">200g</div>`;

    } else if(tile.type==='utility'){
      el.classList.add('utility-tile');
      const icon = tile.utilityType==='guild'?'🔮':'⚗';
      el.innerHTML=`<span class="special-icon">${icon}</span><div class="special-label">${shortName(tile.name)}</div>`;

    } else if(tile.type==='chance'){
      el.classList.add('chance-tile');
      el.innerHTML=`<span class="special-icon">🌀</span><div class="special-label">Fate's Whisper</div>`;

    } else if(tile.type==='community'){
      el.classList.add('community-tile');
      el.innerHTML=`<span class="special-icon">💰</span><div class="special-label">Treasure Trove</div>`;

    } else if(tile.type==='tax'){
      el.classList.add('tax-tile');
      const icon = tile.taxAmount>=200?'👑':'💎';
      el.innerHTML=`<span class="special-icon">${icon}</span><div class="special-label">${shortName(tile.name)}</div>`;

    } else if(tile.type==='go'){
      el.classList.add('corner');
      el.innerHTML=`<div class="corner-inner"><span class="corner-icon">🏕</span><div class="corner-title">Adventurer's Rest</div><div class="corner-sub">Collect 200g</div></div>`;

    } else if(tile.type==='jail'){
      el.classList.add('corner');
      el.style.background='#10140a';
      el.innerHTML=`<div class="corner-inner" style="justify-content:space-between;padding:8px;">
        <div style="font-size:0.42rem;color:var(--dim);font-family:'Cinzel',serif;letter-spacing:1px;">JUST VISITING</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
          <span style="font-size:1.6rem;">⛓</span>
          <div class="corner-title">Guard's Quarters</div>
        </div>
        <div style="font-size:0.42rem;color:#ff8888;font-family:'Cinzel',serif;letter-spacing:1px;">DUNGEON KEEP</div>
      </div>`;

    } else if(tile.type==='free_parking'){
      el.classList.add('corner');
      el.innerHTML=`<div class="corner-inner"><span class="corner-icon">⛺</span><div class="corner-title">Safe Haven</div><div class="corner-sub" id="parking-pot-label">Collect the pot!</div></div>`;

    } else if(tile.type==='go_to_jail'){
      el.classList.add('corner');
      el.style.background='#1a0808';
      el.innerHTML=`<div class="corner-inner"><span class="corner-icon">⚖</span><div class="corner-title" style="color:#ff8888;">Fate's Judgement</div><div class="corner-sub">Go to Dungeon!</div></div>`;
    }

    board.appendChild(el);
  });
}

function shortName(name){
  // Shorten long tile names to fit small tiles
  return name.replace('Caravan Crossing','Crossing').replace('Adventurer\'s','Adv.');
}

// TOKENS
// ═══════════════════════════════════════════════════════════
function _tokenOffset(slotIdx){
  // Arrange up to 6 tokens in a 2x3 grid within a tile
  const row = Math.floor(slotIdx/2);
  const col = slotIdx%2;
  return { dx: 3 + col*14, dy: 3 + row*14 };
}

function renderTokens(){
  const layer = document.getElementById('token-layer');
  layer.innerHTML='';
  const wrapRect = document.querySelector('.board-wrap').getBoundingClientRect();
  // Group players by tile position to handle stacking
  const posMap = {};
  G.players.forEach((p,i)=>{ if(!p.bankrupt){ if(!posMap[p.pos]) posMap[p.pos]=[]; posMap[p.pos].push(i); } });

  G.players.forEach((p,i)=>{
    if(p.bankrupt) return;
    const tileEl = document.getElementById(`tile-${p.pos}`);
    if(!tileEl) return;
    const tr = tileEl.getBoundingClientRect();
    const slotIdx = posMap[p.pos].indexOf(i);
    const {dx,dy} = _tokenOffset(slotIdx);
    const token = document.createElement('div');
    token.id = `token-${i}`;
    token.className = 'token' + (i===G.currentIdx?' active-token':'');
    token.style.background = p.color;
    token.style.color = '#fff';
    token.style.left = (tr.left - wrapRect.left + dx) + 'px';
    token.style.top  = (tr.top  - wrapRect.top  + dy) + 'px';
    token.textContent = p.name.charAt(0).toUpperCase();
    token.title = p.name;
    layer.appendChild(token);
  });
}

function moveToken(playerIdx, newPos){
  const wrapRect = document.querySelector('.board-wrap').getBoundingClientRect();
  const tileEl = document.getElementById(`tile-${newPos}`);
  const token  = document.getElementById(`token-${playerIdx}`);
  if(!tileEl||!token) return;
  const tr = tileEl.getBoundingClientRect();
  // Count how many non-bankrupt players are on this tile (including this one)
  const playersOnTile = G.players.filter(p=>!p.bankrupt&&p.pos===newPos);
  const slotIdx = playersOnTile.findIndex(p=>p.idx===playerIdx);
  const {dx,dy} = _tokenOffset(Math.max(0,slotIdx));
  token.style.left = (tr.left - wrapRect.left + dx) + 'px';
  token.style.top  = (tr.top  - wrapRect.top  + dy) + 'px';
}

// PLAYER CARDS (sidebar)
// ═══════════════════════════════════════════════════════════
function renderPlayerCards(){
  const c = document.getElementById('player-cards');
  c.innerHTML = '';
  G.players.forEach((p,i)=>{
    if(p.bankrupt) return;
    const owned = Object.entries(G.tileOwners).filter(([,oi])=>oi===i);
    const propDots = owned.map(([tid])=>{
      const tile = TILES[+tid];
      if(!tile) return '';
      const col = tile.color ? COLOR_HEX[tile.color] : (tile.type==='railroad'?'#555':'#338');
      return `<div class="prop-dot" style="background:${col}" title="${tile.name}"></div>`;
    }).join('');

    const gearTag  = p.gear ? `<span class="tag gear-tag">⚔ ${p.gear.short}</span>` : '';
    const potTags  = p.potions.map(pot=>`<span class="tag potion-tag">🧪 ${pot.name.split(' ')[0]}</span>`).join('');
    const jailTag  = p.inJail ? `<span class="tag jail-tag">⛓ Jailed (${p.jailTurns}/3)</span>` : '';

    c.innerHTML += `
    <div class="player-card" id="pcard-${i}" style="background:${p.color}22;border-color:${p.color}55;cursor:pointer;" onclick="showPlayerInfo(${i})" title="Click to see ${p.name}'s holdings">
      <div class="player-card-header">
        <div class="player-token-icon" style="background:${p.color}"></div>
        <div class="player-name-label" style="color:${p.color}">${p.name}</div>
        <div style="margin-left:auto;font-size:0.7rem;color:var(--dim);">👁 holdings</div>
      </div>
      <div class="player-gold">${p.gold}g <span>gold</span></div>
      <div class="player-tags">${gearTag}${potTags}${jailTag}</div>
      ${owned.length?`<div class="prop-list">${propDots}</div>`:''}
    </div>`;
  });

  // highlight active
  document.querySelectorAll('.player-card').forEach(c=>c.classList.remove('active-turn'));
  const activePcard = document.getElementById(`pcard-${G.currentIdx}`);
  if(activePcard) activePcard.classList.add('active-turn');
}

// TURN MANAGEMENT
// ═══════════════════════════════════════════════════════════
function startTurn(){
  const p = cur();
  if(p.skipTurns>0){
    p.skipTurns--;
    log(`${p.name} is skipping a turn.`,'danger');
    endTurn();
    return;
  }
  if(p.curse>0){
    p.curse--;
    deductGold(p, p.curseAmount, 'curse damage');
  }
  document.getElementById('turn-banner').textContent = `${p.name}'s Turn`;
  document.getElementById('roll-btn').disabled = false;
  document.getElementById('roll-btn').style.display = '';
  const jailBtn = document.getElementById('jail-pay-btn');
  jailBtn.style.display = p.inJail ? '' : 'none';
  G.turnPhase = 'roll';
  refreshBuildPanel();
}

function cur(){ return G.players[G.currentIdx]; }

async function rollDice(){
  const p = cur();
  document.getElementById('roll-btn').disabled=true;

  // Animate dice + sound
  sfxDiceRoll();
  const d1el=document.getElementById('die1'), d2el=document.getElementById('die2');
  d1el.classList.add('rolling'); d2el.classList.add('rolling');
  await sleep(650);
  d1el.classList.remove('rolling'); d2el.classList.remove('rolling');

  let d1=randInt(1,6), d2=randInt(1,6);
  // Boot of the Swift Wind: roll 3 keep best 2
  if(p.gear?.effect==='move_bonus'){
    const d3=randInt(1,6);
    const three=[d1,d2,d3].sort((a,b)=>b-a);
    d1=three[0]; d2=three[1];
    log(`${p.name}'s boots grant a bonus die!`);
  }
  const doubles = d1===d2;
  const total = d1+d2;

  d1el.textContent = DICE_FACES[d1-1];
  d2el.textContent = DICE_FACES[d2-1];

  log(`${p.name} rolls ${d1}+${d2}=${total}${doubles?' 🎲 DOUBLES!':''}`);

  if(p.inJail){
    if(doubles){
      p.inJail=false; p.jailTurns=0;
      log(`${p.name} rolled doubles and escapes the Dungeon Keep!`,'success');
      await movePlayerBy(p, total);
    } else {
      p.jailTurns++;
      if(p.jailTurns>=3){
        p.inJail=false; p.jailTurns=0;
        deductGold(p,50,'jail fine');
        log(`${p.name} paid 50g to escape after 3 turns.`,'danger');
        await movePlayerBy(p,total);
      } else {
        log(`${p.name} remains jailed. (${p.jailTurns}/3 turns)`,'danger');
        endTurn();
        return;
      }
    }
  } else {
    if(doubles){
      G.doublesCount++;
      if(G.doublesCount>=3){
        log(`${p.name} rolled doubles 3 times — sent to the Dungeon!`,'danger');
        sendToJail(p);
        endTurn();
        return;
      }
      G.doublesPending=true; // will roll again AFTER tile actions resolve
    } else {
      G.doublesCount=0;
      G.doublesPending=false;
    }
    await movePlayerBy(p, total);
  }
  renderPlayerCards();
  renderTokens();
}

async function movePlayerBy(p, spaces){
  const oldPos = p.pos;
  const newPos = (p.pos + spaces) % 40;
  // Check pass Go
  if(newPos < oldPos && !p.inJail){
    p.gold += 200;
    log(`${p.name} passes Adventurer's Rest — collect 200g!`,'success');
  }
  p.pos = newPos;
  moveToken(p.idx, newPos);
  await sleep(500);
  await landOnTile(p, TILES[newPos]);
}

// ═══════════════════════════════════════════════════════════
// LANDING ON TILES
// ═══════════════════════════════════════════════════════════
async function landOnTile(p, tile){
  log(`${p.name} lands on ${tile.name}`);
  renderPlayerCards();

  if(tile.type==='go'){
    // already collected 200 passing; if you land exactly, collect again
    p.gold += 200;
    log(`${p.name} lands exactly on Adventurer's Rest — bonus 200g!`,'success');
    endTurn();

  } else if(tile.type==='go_to_jail'){
    showEvent(tile, p, ()=>{
      sendToJail(p);
      endTurn();
    });

  } else if(tile.type==='jail'){
    log(`${p.name} is just visiting the Guard's Quarters.`);
    endTurn();

  } else if(tile.type==='free_parking'){
    const pot = G.freeParking;
    G.freeParking = 0;
    p.gold += pot;
    if(pot>0) log(`${p.name} collects the Safe Haven pot: ${pot}g!`,'success');
    else log(`${p.name} rests at Safe Haven — no pot this time.`);
    endTurn();

  } else if(tile.type==='chance'){
    drawFatesWhisper(p);

  } else if(tile.type==='community'){
    drawTreasureTrove(p);

  } else if(tile.type==='tax'){
    showEvent(tile, p, ()=>endTurn());

  } else if(tile.type==='property'||tile.type==='railroad'||tile.type==='utility'){
    const ownedBy = G.tileOwners[tile.id];
    if(ownedBy===undefined){
      // Unowned — trigger event
      showEvent(tile, p, ()=>endTurn());
    } else if(ownedBy===p.idx){
      log(`${p.name} visits their own ${tile.name}.`);
      endTurn();
    } else {
      // Pay rent
      const owner = G.players[ownedBy];
      // Skip if mortgaged
      if(G.mortgaged[tile.id]){
        log(`${tile.name} is mortgaged — no rent owed.`);
        endTurn(); return;
      }
      const rentAmt = calcRent(tile, ownedBy);
      // Cloak of Shadows: skip rent once
      if(p.gear?.effect==='skip_rent' && p.gear.cloakUsed!==true){
        p.gear.cloakUsed=true;
        showRentToast(p, owner, rentAmt, true);
        log(`${p.name}'s Cloak of Shadows negates the rent!`,'success');
        await sleep(1800);
        endTurn(); return;
      }
      // Brew of Protection: halve rent once
      const brewIdx = p.potions.findIndex(pot=>pot.effect==='negate_rent');
      let rent = rentAmt;
      if(brewIdx>=0){
        rent = Math.floor(rentAmt/2);
        p.potions.splice(brewIdx,1);
        log(`${p.name}'s Brew of Protection halves rent to ${rent}g!`,'success');
      }
      if(p.gear?.effect==='defense') rent = Math.floor(rent*0.9);
      showRentToast(p, owner, rent, false);
      log(`${p.name} pays ${rent}g rent to ${owner.name} for ${tile.name}!`,'danger');
      deductGold(p, rent, `rent to ${owner.name}`);
      owner.gold += rent;
      renderPlayerCards();
      checkBankruptcy(p);
      await sleep(2000);
      endTurn();
    }
  }
}

function calcRent(tile, ownerIdx){
  if(tile.type==='railroad'){
    const rrCount = TILES.filter(t=>t.type==='railroad'&&G.tileOwners[t.id]===ownerIdx).length;
    return [0,25,50,100,200][rrCount];
  }
  if(tile.type==='utility'){
    const utilCount = TILES.filter(t=>t.type==='utility'&&G.tileOwners[t.id]===ownerIdx).length;
    const roll = randInt(1,6)+randInt(1,6);
    return roll * (utilCount===2?10:4);
  }
  // Property — check buildings first
  const builds = G.buildings[tile.id]||0;
  if(builds > 0) return tile.rent[Math.min(builds, tile.rent.length-1)];
  const groupOwned = COLOR_GROUPS[tile.color]?.every(id=>G.tileOwners[id]===ownerIdx);
  return groupOwned ? tile.rent[0]*2 : tile.rent[0];
}

// ═══════════════════════════════════════════════════════════
// EVENT MODAL
// ═══════════════════════════════════════════════════════════
function showEvent(tile, player, onDone){
  const ev = tile.event;
  if(!ev){ onDone(); return; }

  document.getElementById('event-title').textContent = ev.title;
  document.getElementById('event-subtitle').textContent = tile.name + (tile.price?` — ${G.tilePrices[tile.id]||tile.price}g`:'');
  document.getElementById('event-story').textContent = ev.story;
  document.getElementById('event-result-area').innerHTML='';
  document.getElementById('purchase-bar').style.display='none';
  document.getElementById('event-modal').classList.remove('hidden');

  const choicesEl = document.getElementById('event-choices');
  choicesEl.innerHTML='';

  if(tile.type==='tax'){
    const taxAmt = Math.min(tile.taxAmount, Math.floor(player.gold*0.1));
    buildChoice({text:`Pay tribute (${taxAmt}g)`,type:'tax_pay'}, tile, player, taxAmt, onDone, choicesEl);
    // Add bribe if event has it
    if(ev.choices&&ev.choices.length>1){
      buildChoice(ev.choices[1], tile, player, taxAmt, onDone, choicesEl);
    }
    return;
  }
  if(tile.type==='go_to_jail'){
    buildChoice({text:'Accept fate',type:'goto_jail'}, tile, player, 0, onDone, choicesEl);
    return;
  }

  ev.choices.forEach(ch=>buildChoice(ch, tile, player, 0, onDone, choicesEl));
}

function buildChoice(ch, tile, player, taxContext, onDone, container){
  const btn = document.createElement('button');
  btn.className='choice-btn';
  let label = ch.text;
  btn.innerHTML=`${label}`;
  if(ch.cost) btn.innerHTML+=`<span class="choice-cost">Cost: ${ch.cost}g</span>`;
  if(ch.dc)   btn.innerHTML+=`<span class="choice-risk">Combat/Skill DC ${ch.dc} (roll d20)</span>`;
  btn.onclick=()=>resolveChoice(ch, tile, player, taxContext, onDone);
  container.appendChild(btn);
}

async function resolveChoice(ch, tile, player, taxContext, onDone){
  document.getElementById('event-choices').innerHTML='';
  const resultArea = document.getElementById('event-result-area');

  if(ch.type==='close'){
    closeEventModal(); onDone(); return;
  }
  if(ch.type==='goto_jail'){
    closeEventModal(); sendToJail(player); onDone(); return;
  }
  if(ch.type==='tax_pay'){
    deductGold(player, taxContext, 'tax');
    G.freeParking += taxContext;
    showResult(resultArea,'neutral',`You pay ${taxContext}g. The herald bows and departs.`);
    await sleep(1800); closeEventModal(); onDone(); return;
  }
  if(ch.type==='buy'||ch.type==='buy_fixed'){
    const price = ch.fixedPrice || G.tilePrices[tile.id] || tile.price;
    if(player.gold<price){
      showResult(resultArea,'failure',`You cannot afford ${price}g.`);
      await sleep(1500); closeEventModal(); onDone(); return;
    }
    showPurchaseBar(tile, player, price, onDone, resultArea);
    return;
  }
  if(ch.type==='pay_then_buy'){
    if(player.gold<ch.cost){
      showResult(resultArea,'failure',`You cannot afford the ${ch.cost}g upfront cost.`);
      await sleep(1500); closeEventModal(); onDone(); return;
    }
    deductGold(player,ch.cost,`upfront fee`);
    const price = G.tilePrices[tile.id]||tile.price;
    if(player.gold<price){
      showResult(resultArea,'failure',`After paying ${ch.cost}g, you can't afford ${price}g.`);
      await sleep(1500); closeEventModal(); onDone(); return;
    }
    showPurchaseBar(tile, player, price, onDone, resultArea);
    return;
  }
  if(ch.type==='gain_gold'){
    player.gold += ch.gainValue||0;
    log(`${player.name} gains ${ch.gainValue}g!`,'success');
    showResult(resultArea,'success',`You gain ${ch.gainValue}g!`);
    renderPlayerCards();
    await sleep(1800); closeEventModal(); onDone(); return;
  }
  if(ch.type==='open_gear_shop'||ch.type==='buy_then_shop'){
    if(ch.type==='buy_then_shop'){
      if(player.gold<150){showResult(resultArea,'failure','Not enough gold for membership.'); await sleep(1500); closeEventModal(); onDone(); return;}
      deductGold(player,150,'guild membership');
      G.tileOwners[tile.id]=player.idx;
      updateTileDisplay(tile.id, player);
      log(`${player.name} joins the Mage's Guild!`,'success');
    }
    closeEventModal();
    openGearShop(player, onDone);
    return;
  }
  if(ch.type==='open_potion_shop'){
    closeEventModal();
    openPotionShop(player, onDone);
    return;
  }

  // Combat/Skill check
  if(ch.type==='combat'||ch.type==='dm_secret'){
    const bonus = player.gear?.effect==='combat_bonus'?3:(player.gear?.effect==='double_attack'?2:0);
    const result = await rollEventD20(ch.dc, bonus);
    if(result.success){
      // Critical 20: upgrade the reward
      let msg = result.isCritSuccess
        ? `⚔ CRITICAL HIT! ` + (ch.critMsg || ch.successMsg||'You exceed all expectations!')
        : (ch.successMsg||'Success!');
      resultArea.innerHTML += `<div class="modal-result success" style="margin-top:8px;white-space:pre-wrap;">${msg}</div>`;
      await handleChoiceSuccess(ch, tile, player, onDone, resultArea, result.isCritSuccess);
    } else {
      // Critical 1: downgrade — lose more gold
      let msg = result.isCritFail
        ? `💀 CATASTROPHIC FAILURE! ` + (ch.critFailMsg || ch.failMsg||'A disaster of legendary proportions.')
        : (ch.failMsg||'Failure!');
      resultArea.innerHTML += `<div class="modal-result failure" style="margin-top:8px;white-space:pre-wrap;">${msg}</div>`;
      await handleChoiceFailure(ch, tile, player, onDone, resultArea, result.isCritFail);
    }
    renderPlayerCards();
    await sleep(2200); closeEventModal(); onDone();
    return;
  }
  if(ch.type==='gamble_invest'){
    const investAmt = ch.investAmount||200;
    if(player.gold<investAmt){showResult(resultArea,'failure',`You need ${investAmt}g to invest.`); await sleep(1500); closeEventModal(); onDone(); return;}
    const dc=10; const bonus=0;
    const result=await rollEventD20(dc, bonus);
    if(result.success){
      player.gold += investAmt; // get back double (net +invest)
      showResult(resultArea,'success',`🎲 Rolled ${result.roll} — the merchant is legitimate! Your ${investAmt}g becomes ${investAmt*2}g!`);
    } else {
      deductGold(player, investAmt, 'swindled investment');
      showResult(resultArea,'failure',`🎲 Rolled ${result.roll} — you were swindled! Lost ${investAmt}g.`);
    }
    renderPlayerCards();
    await sleep(2200);
    // Still offer purchase
    const price = G.tilePrices[tile.id]||tile.price;
    if(player.gold>=price) showPurchaseBar(tile, player, price, onDone, resultArea);
    else { closeEventModal(); onDone(); }
    return;
  }
  if(ch.type==='half_tax'){
    const half=Math.floor(taxContext/2);
    deductGold(player,half,'bribe');
    G.freeParking+=half;
    showResult(resultArea,'success',`You pay only ${half}g. The official pockets your bribe.`);
    await sleep(1800); closeEventModal(); onDone(); return;
  }
  if(ch.type==='double_tax'){
    const dbl=taxContext*2;
    deductGold(player,dbl,'double tax fine');
    G.freeParking+=dbl;
    showResult(resultArea,'failure',`You pay ${dbl}g in fines!`);
    await sleep(1800); closeEventModal(); onDone(); return;
  }

  // fallback
  closeEventModal(); onDone();
}

async function handleChoiceSuccess(ch, tile, player, onDone, resultArea, isCrit=false){
  const eff = ch.successEffect;
  // On critical success: buy_discount → buy_free, buy_fixed → buy_free, buy_free → buy_free + bonus gold
  const effectivEff = isCrit
    ? (eff==='buy_discount'||eff==='buy_fixed'?'buy_free':'buy_free_bonus')
    : eff;
  const critBonus = isCrit ? Math.floor((G.tilePrices[tile.id]||tile.price)*0.25) : 0;

  if(effectivEff==='buy'||eff==='buy_fixed'){
    const price=ch.fixedPrice||G.tilePrices[tile.id]||tile.price;
    if(player.gold>=price){ deductGold(player,price,'property'); G.tileOwners[tile.id]=player.idx; updateTileDisplay(tile.id,player); log(`${player.name} acquires ${tile.name}!`,'success'); }
    else showPurchaseBar(tile,player,price,onDone,resultArea);
  } else if(eff==='buy_discount'&&!isCrit){
    const price=ch.discountPrice||Math.floor((G.tilePrices[tile.id]||tile.price)/2);
    if(player.gold>=price){ deductGold(player,price,'property'); G.tileOwners[tile.id]=player.idx; updateTileDisplay(tile.id,player); log(`${player.name} acquires ${tile.name} at ${price}g!`,'success'); }
    else showPurchaseBar(tile,player,price,onDone,resultArea);
  } else if(effectivEff==='buy_free'||effectivEff==='buy_free_bonus'||eff==='buy_free'||eff==='buy_free_bonus'){
    G.tileOwners[tile.id]=player.idx; updateTileDisplay(tile.id,player);
    const bonus=(eff==='buy_free_bonus'&&ch.bonusGold?ch.bonusGold:0)+critBonus;
    log(`${player.name} acquires ${tile.name} for FREE!${isCrit?' (CRITICAL BONUS!)':''}`, 'success');
    if(bonus){ player.gold+=bonus; log(`${player.name} gains ${bonus}g bonus!`,'success'); }
  } else if(eff==='raise_price'){
    // success on druid quest = discount; already described in successMsg
  }
}

async function handleChoiceFailure(ch, tile, player, onDone, resultArea, isCrit=false){
  const eff=ch.failEffect;
  // On critical fail: lose 50% more gold + always skip turn
  const multi = isCrit ? 1.5 : 1;
  if(eff==='lose_gold'&&ch.failValue){ deductGold(player,Math.floor(ch.failValue*multi),'event penalty'); if(isCrit){player.skipTurns++;log(`${player.name} loses their next turn!`,'danger');} }
  if(eff==='lose_gold_skip'&&ch.failValue){ deductGold(player,Math.floor(ch.failValue*multi),'event penalty'); player.skipTurns+=(isCrit?2:1); }
  if(eff==='lose_gold_block'&&ch.failValue){ deductGold(player,Math.floor(ch.failValue*multi),'event penalty'); }
  if(eff==='block_purchase'){ if(isCrit){ deductGold(player,50,'critical fumble fee'); } }
  if(eff==='buy'){
    const price=G.tilePrices[tile.id]||tile.price;
    const penalty=isCrit?Math.floor(price*0.1):0;
    if(penalty) deductGold(player,penalty,'critical fumble surcharge');
    if(player.gold>=price){ deductGold(player,price,'property'); G.tileOwners[tile.id]=player.idx; updateTileDisplay(tile.id,player); }
  }
  if(eff==='raise_price'&&ch.failValue){ G.tilePrices[tile.id]=(G.tilePrices[tile.id]||tile.price)+Math.floor(ch.failValue*multi); }
  if(eff==='double_tax'){ deductGold(player,Math.floor((tile.taxAmount||100)*2*multi),'double tax'); }
  checkBankruptcy(player);
}

function showPurchaseBar(tile, player, price, onDone, resultArea){
  const bar = document.getElementById('purchase-bar');
  bar.style.display='flex';
  bar.innerHTML=`
    <button class="btn btn-gold" onclick="doPurchase(${tile.id},${player.idx},${price})">Buy ${tile.name} (${price}g)</button>
    <button class="btn btn-outline" onclick="closeEventModal_done()">Pass</button>`;
  // Store callback
  window._eventOnDone=onDone;
}

function doPurchase(tileId, playerIdx, price){
  const player=G.players[playerIdx];
  const tile=TILES[tileId];
  if(player.gold<price){alert('Not enough gold!'); return;}
  deductGold(player,price,'property');
  G.tileOwners[tileId]=playerIdx;
  updateTileDisplay(tileId,player);
  log(`${player.name} purchases ${tile.name} for ${price}g!`,'success');
  renderPlayerCards();
  closeEventModal();

}

function closeEventModal_done(){

}

function closeEventModal(){

function showResult(area, type, msg){
  area.innerHTML=`<div class="modal-result ${type}">${msg.replace(/\n/g,'<br>')}</div>`;
}

async function rollEventD20(dc, bonus=0){
  const resultArea=document.getElementById('event-result-area');
  resultArea.innerHTML=`<div class="dice-display rolling-anim" style="font-size:2.5rem;text-align:center;">🎲</div>`;
  sfxDiceRoll();
  await sleep(700);
  const rawRoll=randInt(1,20);
  const isCritSuccess = rawRoll===20;
  const isCritFail    = rawRoll===1;
  const total = rawRoll+bonus;
  const success = isCritSuccess || (!isCritFail && total>=dc);

  // Visual feedback
  let rollColor = success ? '#88ff88' : '#ff6666';
  let label = success ? (isCritSuccess?'⚔ CRITICAL HIT!':'✅ Success') : (isCritFail?'💀 CRITICAL FAIL!':'❌ Failure');
  let rollStyle = isCritSuccess ? 'color:#ffd700;text-shadow:0 0 20px #ffd700;font-size:3rem;'
                : isCritFail   ? 'color:#ff3333;text-shadow:0 0 20px #ff3333;font-size:3rem;'
                : `color:${rollColor};`;

  resultArea.innerHTML=`
    <div style="${rollStyle}text-align:center;font-weight:bold;font-family:'Cinzel',serif;font-size:2.2rem;">${rawRoll}</div>
    <div style="text-align:center;font-size:0.85rem;color:var(--dim);margin:4px 0;">
      Rolled ${rawRoll}${bonus?`+${bonus}=<b style="color:var(--text)">${total}</b>`:''} vs DC ${dc}
    </div>
    <div style="text-align:center;font-family:'Cinzel',serif;font-size:1rem;color:${rollColor};letter-spacing:2px;margin-top:4px;">${label}</div>`;

  if(isCritSuccess) sfxCritSuccess();
  else if(isCritFail) sfxCritFail();
  else if(success) sfxSuccess();
  else sfxFailure();

  await sleep(700);
  return {roll:total, rawRoll, isCritSuccess, isCritFail, success};
}

function drawFatesWhisper(player){
  if(G.deckFates.length===0) G.deckFates=shuffle([...FATES_WHISPER]);
  const card=G.deckFates.pop();
  applyCardEffect(card, player, 'Fate\'s Whisper', ()=>endTurn());
}

function drawTreasureTrove(player){
  if(G.deckTreasure.length===0) G.deckTreasure=shuffle([...TREASURE_TROVE]);
  const card=G.deckTreasure.pop();
  applyCardEffect(card, player, 'Treasure Trove', ()=>endTurn());
}

function applyCardEffect(card, player, deckName, onDone){
  document.getElementById('card-title').textContent=card.title;
  document.getElementById('card-type-label').textContent=deckName;
  document.getElementById('card-story').textContent=card.story;
  const resultEl=document.getElementById('card-result');
  resultEl.style.display='none';
  document.getElementById('card-modal').classList.remove('hidden');
  window._cardOnDone=onDone;

  let resultMsg='';
  if(card.effect==='gain_gold'){
    let amt=card.value;
    if(card.cost){ deductGold(player,card.cost,'wishing well'); }
    player.gold+=amt; resultMsg=`You gain ${amt}g!`;
    log(`${player.name}: ${card.title} — +${amt}g`,'success');
  } else if(card.effect==='lose_gold'){
    const amt=Math.abs(card.value);
    deductGold(player,amt,card.title);
    resultMsg=`You lose ${amt}g.`;
  } else if(card.effect==='all_lose'){
    const amt=Math.abs(card.value);
    G.players.forEach(p=>{ if(!p.bankrupt){ deductGold(p,amt,card.title); } });
    resultMsg=`All players lose ${amt}g!`;
  } else if(card.effect==='move'){
    const spaces=card.value;
    resultMsg=`You move ${Math.abs(spaces)} spaces ${spaces>0?'forward':'back'}!`;
    closeCardModal_then(async ()=>{
      await movePlayerBy(player,((spaces%40)+40)%40);
      renderPlayerCards(); renderTokens(); onDone();
    });
    return;
  } else if(card.effect==='advance_go'){
    const toGo=40-player.pos;
    player.gold+=200;
    resultMsg=`Advance to Go! Collect 200g.`;
    closeCardModal_then(async ()=>{
      await movePlayerBy(player,toGo);
      renderPlayerCards(); renderTokens(); onDone();
    });
    return;
  } else if(card.effect==='gamble'){
    const roll=randInt(1,6);
    if(roll>=4){ player.gold+=150; resultMsg=`Rolled ${roll} — gained 150g!`; }
    else { deductGold(player,100,'gamble'); resultMsg=`Rolled ${roll} — lost 100g.`; }
  } else if(card.effect==='curse_self'){
    player.gold+=100; player.curse=3; player.curseAmount=25;
    resultMsg=`You gain 100g but are cursed — lose 25g per turn for 3 turns.`;
  } else if(card.effect==='give_potion'){
    if(player.potions.length<2){
      const pot=POTIONS[randInt(0,POTIONS.length-1)];
      player.potions.push(pot);
      resultMsg=`You receive: ${pot.name}! (${pot.desc})`;
    } else {
      resultMsg=`Your pouch is full — you can't carry more potions.`;
    }
  }

  if(resultMsg){
    resultEl.textContent=resultMsg;
    resultEl.style.display='block';
  }
  renderPlayerCards();
  checkBankruptcy(player);
}

function closeCardModal(){
  document.getElementById('card-modal').classList.add('hidden');
  if(window._cardOnDone) window._cardOnDone();
}
function closeCardModal_then(fn){
  document.getElementById('card-modal').classList.add('hidden');
  fn();
}

function openGearShop(player, onDone){
  const items = GEAR_ITEMS.map(g=>{
    const owned = player.gear?.id===g.id;
    const canAfford = player.gold>=g.price;
    const hasGear = player.gear && !owned;
    return `
    <div class="shop-item ${!canAfford?'cant-afford':''} ${owned?'already-owned':''}"
         onclick="${canAfford&&!owned&&!hasGear?`buyGear('${g.id}')`:''}" title="${hasGear?'Already carrying gear — sell your current item first':''}">
      <div class="shop-item-name">${g.name}</div>
      <div class="shop-item-price">${g.price}g · ${g.tag}</div>
      <div class="shop-item-effect">${g.desc}</div>
      ${owned?'<div style="color:#88ff88;font-size:0.7rem;margin-top:4px;">✓ Equipped</div>':''}
      ${hasGear?'<div style="color:#ff8888;font-size:0.7rem;margin-top:4px;">⚠ Already have gear</div>':''}
    </div>`;
  }).join('');
  document.getElementById('event-title').textContent="Mage's Guild — Equipment";
  document.getElementById('event-subtitle').textContent='Choose one piece of enchanted gear';
  document.getElementById('event-story').innerHTML='';
  document.getElementById('event-result-area').innerHTML='';
  document.getElementById('event-choices').innerHTML=`<div class="shop-grid">${items}</div><div style="margin-top:12px;text-align:center;"><button class="btn btn-outline" onclick="closeEventModal_done()">Leave Shop</button></div>`;
  document.getElementById('event-modal').classList.remove('hidden');
  window._eventOnDone=onDone;
  window._shopPlayer=player;
}

function buyGear(gearId){
  const player=window._shopPlayer||cur();
  const gear=GEAR_ITEMS.find(g=>g.id===gearId);
  if(!gear||player.gold<gear.price) return;
  deductGold(player,gear.price,'gear purchase');
  player.gear=gear;
  log(`${player.name} equips ${gear.name}!`,'success');
  renderPlayerCards();
  closeEventModal();
  if(window._eventOnDone) window._eventOnDone();
}

function openPotionShop(player, onDone){
  const potList = POTIONS.slice(0,6).map((pot,i)=>{
    const canAfford=player.gold>=200;
    const full=player.potions.length>=2;
    return `
    <div class="shop-item ${!canAfford||full?'cant-afford':''}"
         onclick="${canAfford&&!full?`buyPotion(${i})`:''}" >
      <div class="shop-item-name">${pot.name}</div>
      <div class="shop-item-price">200g · 🧪 Mystery</div>
      <div class="shop-item-effect">Effect unknown until consumed</div>
    </div>`;
  }).join('');
  document.getElementById('event-title').textContent='Potion Shop';
  document.getElementById('event-subtitle').textContent='All potions 200g · Max 2 carried';
  document.getElementById('event-story').innerHTML='';
  document.getElementById('event-result-area').innerHTML='';
  document.getElementById('event-choices').innerHTML=`
    <div class="shop-grid">${potList}</div>
    <div style="margin-top:12px;text-align:center;">
      ${player.potions.length>0?`<button class="btn btn-outline btn-sm" style="margin-right:8px" onclick="usePotionMenu()">🧪 Use a Potion</button>`:''}
      <button class="btn btn-outline" onclick="closeEventModal_done()">Leave</button>
    </div>`;
  document.getElementById('event-modal').classList.remove('hidden');
  window._eventOnDone=onDone;
  window._shopPlayer=player;
}

function buyPotion(potIdx){
  const player=window._shopPlayer||cur();
  if(player.gold<200||player.potions.length>=2) return;
  deductGold(player,200,'potion');
  // Random potion — player doesn't know which
  const pot=POTIONS[randInt(0,POTIONS.length-1)];
  player.potions.push(pot);
  log(`${player.name} buys a mysterious potion!`,'success');
  renderPlayerCards();
  closeEventModal();
  if(window._eventOnDone) window._eventOnDone();
}

function usePotionMenu(){
  const player=window._shopPlayer||cur();
  if(!player.potions.length) return;
  const pot=player.potions.shift();
  applyPotion(player,pot);
  renderPlayerCards();
  closeEventModal();
  if(window._eventOnDone) window._eventOnDone();
}

function applyPotion(player, pot){
  if(pot.effect==='gain_gold'){ player.gold+=pot.value; log(`${player.name} drinks ${pot.name}: +${pot.value}g!`,'success'); }
  else if(pot.effect==='lose_gold'){ deductGold(player,Math.abs(pot.value),'cursed potion'); log(`${player.name} suffers a cursed potion: -${Math.abs(pot.value)}g`,'danger'); }
  else if(pot.effect==='negate_rent'){ player.potionBuff='negate_rent'; log(`${player.name} will halve their next rent payment.`,'success'); }
  else if(pot.effect==='extra_turn'){ log(`${player.name} gains an extra turn!`,'success'); }
  else { log(`${player.name} uses ${pot.name}: ${pot.desc}`,'success'); }
  checkBankruptcy(player);
}

function updateTileDisplay(tileId, owner){
  const el=document.getElementById(`tile-${tileId}`);
  if(!el) return;
  // Remove old owner classes
  el.classList.remove('owned-p0','owned-p1','owned-p2','owned-p3','owned-p4','owned-p5');
  // Remove old flag/mortgage overlays
  el.querySelector('.owner-flag')?.remove();
  el.querySelector('.mortgaged-badge')?.remove();

  if(owner){
    el.classList.add(`owned-p${owner.idx}`);
    // Small colored badge with player initial
    const flag = document.createElement('div');
    flag.className = 'owner-flag';
    flag.style.background = owner.color;
    flag.textContent = owner.name.charAt(0).toUpperCase();
    flag.title = `Owned by ${owner.name}`;
    el.appendChild(flag);
  }

  // Mortgaged overlay
  if(G.mortgaged && G.mortgaged[tileId]){
    const mb = document.createElement('div');
    mb.className = 'mortgaged-badge';
    mb.innerHTML = '<span>MRTG</span>';
    el.appendChild(mb);
  }
}

// Refresh all tile displays (call after loading saved state or bankruptcy)
function refreshAllTileDisplays(){
  TILES.forEach(t=>{
    if(t.type==='property'||t.type==='railroad'||t.type==='utility'){
      const ownIdx = G.tileOwners[t.id];
      updateTileDisplay(t.id, ownIdx!==undefined ? G.players[ownIdx] : null);
    }
  });
}

function updateBuildingPips(tileId){
  const count = G.buildings[tileId]||0;
  for(let i=0;i<5;i++){
    const pip=document.getElementById(`pip-${tileId}-${i}`);
    if(!pip) continue;
    pip.classList.remove('filled','hotel');
    if(i < count){
      if(count===5 && i===4) pip.classList.add('hotel');
      else pip.classList.add('filled');
    }
  }
}

// Helper: add mortgage/sell buttons to any purchasable tile's action area
function _addOwnerActions(actions, tileId, tile, owner, currentPlayer){
  if(G.phase==='playing' && currentPlayer && owner && owner.idx===currentPlayer.idx){
    if(!G.mortgaged[tileId]){
      const mortgageVal = Math.floor((G.tilePrices[tileId]||tile.price)/2);
      actions.innerHTML+=`<button class="btn btn-outline btn-sm" style="border-color:#f39c12;color:#f39c12;" onclick="mortgageTile(${tileId})">⚓ Mortgage (+${mortgageVal}g)</button>`;
    } else {
      const unmortgageCost = Math.floor((G.tilePrices[tileId]||tile.price)/2*1.1);
      actions.innerHTML+=`<button class="btn btn-outline btn-sm" style="border-color:#2ecc71;color:#2ecc71;" onclick="unmortgageTile(${tileId})" ${currentPlayer.gold<unmortgageCost?'disabled':''}>✅ Lift Mortgage (${unmortgageCost}g)</button>`;
    }
    const sellVal = Math.floor((G.tilePrices[tileId]||tile.price)*0.6);
    actions.innerHTML+=`<button class="btn btn-danger btn-sm" onclick="if(confirm('Sell ${tile.name} for ${sellVal}g?'))sellProperty(${tileId})">🏚 Sell (+${sellVal}g)</button>`;
  }
  actions.innerHTML+=`<button class="btn btn-outline btn-sm" onclick="closeTileInfo()">Close</button>`;
}

  const body = document.getElementById('tinfo-body');
  const actions = document.getElementById('tinfo-actions');

  titleEl.textContent = tile.name;
  groupEl.textContent = '';
  ownerWrap.innerHTML = '';
  body.innerHTML = '';
  actions.innerHTML = '';

  if(tile.type==='property'){
    const hex = COLOR_HEX[tile.color]||'#555';

    // Check if current player owns full group
    const groupTiles = COLOR_GROUPS[tile.color]||[];
    const ownerHasGroup = owner && groupTiles.every(id=>G.tileOwners[id]===ownerIdx);

    // Rent table
    const rentLabels = ['Base rent','Full color group','1 Outpost','2 Outposts','3 Outposts','City','Capital'];
    const rentValues = [tile.rent[0], tile.rent[0]*2, tile.rent[1], tile.rent[2], tile.rent[3], tile.rent[4], tile.rent[5]];
    let rentRows = '';
    rentLabels.forEach((lbl,i)=>{
      // Determine which row is currently active

      if(owner){
        if(ownerHasGroup && buildCount===0) activeRow=1;
        else if(buildCount>0) activeRow = Math.min(buildCount+1, 6);
      }
      const isActive = (i===activeRow && owner);
      rentRows += `<tr class="${isActive?'current-rent':''}">
        <td>${lbl}${i===0?'':''}</td>
        <td>${rentValues[i]}g${isActive?' ◄':''}</td>

    body.innerHTML=`

        </div>
      </div>`;

    // Action buttons
    if(G.phase==='playing' && currentPlayer){

        actions.innerHTML+=`<button class="btn btn-gold btn-sm" onclick="closeTileInfo();showEvent(TILES[${tileId}],cur(),()=>endTurn())">Enter ${tile.name}</button>`;
      }
      if(owner && owner.idx===currentPlayer.idx){
        if(ownerHasGroup && buildCount<5 && !G.mortgaged[tileId]){
          const buildCost=tile.houseCost;
          actions.innerHTML+=`<button class="btn btn-outline btn-sm" onclick="buildOnTile(${tileId})" ${currentPlayer.gold<buildCost?'disabled':''}>

        if(!G.mortgaged[tileId]){

    if(owner) ownerWrap.innerHTML=`<div class="tinfo-owner-badge" style="background:${owner.color}22;border:1px solid ${owner.color}66;color:${owner.color};"><div style="width:8px;height:8px;border-radius:50%;background:${owner.color}"></div>Owned by ${owner.name}</div>`;

    body.innerHTML=`
      <div class="tinfo-section">

// ═══════════════════════════════════════════════════════════
// MORTGAGE / SELL SYSTEM
// ═══════════════════════════════════════════════════════════
function mortgageTile(tileId){
  const tile = TILES[tileId];
  const player = G.players[G.tileOwners[tileId]];
  if(!player) return;
  const val = Math.floor((G.tilePrices[tileId]||tile.price)/2);
  G.mortgaged[tileId] = true;
  player.gold += val;
  log(`${player.name} mortgages ${tile.name} for ${val}g.`,'warning');
  updateTileDisplay(tileId, player);
  renderPlayerCards();
  closeTileInfo();
}

function unmortgageTile(tileId){
  const tile = TILES[tileId];
  const player = G.players[G.tileOwners[tileId]];
  if(!player) return;
  const cost = Math.floor((G.tilePrices[tileId]||tile.price)/2 * 1.1);
  if(player.gold < cost){ alert(`Need ${cost}g to lift mortgage.`); return; }
  deductGold(player, cost, `unmortgage ${tile.name}`);
  G.mortgaged[tileId] = false;
  log(`${player.name} lifts mortgage on ${tile.name} (${cost}g).`,'success');
  updateTileDisplay(tileId, player);
  renderPlayerCards();
  closeTileInfo();
}

function sellProperty(tileId){
  const tile = TILES[tileId];
  const player = G.players[G.tileOwners[tileId]];
  if(!player) return;
  // Selling returns 60% of purchase price; buildings sell for half build cost each
  const propVal = Math.floor((G.tilePrices[tileId]||tile.price) * 0.6);
  const buildVal = (G.buildings[tileId]||0) * Math.floor((tile.houseCost||0)/2);
  const total = propVal + buildVal;
  player.gold += total;
  delete G.tileOwners[tileId];
  delete G.mortgaged[tileId];
  G.buildings[tileId] = 0;
  log(`${player.name} sells ${tile.name} for ${total}g.`,'success');
  updateTileDisplay(tileId, null);
  updateBuildingPips(tileId);
  renderPlayerCards();
  closeTileInfo();
}

// BUILD PANEL (sidebar)
// ═══════════════════════════════════════════════════════════
function refreshBuildPanel(){
  const panel = document.getElementById('build-panel');
  if(!panel || G.phase!=='playing') return;
  const p = cur();
  // Find color groups this player fully owns
  const buildable = [];
  Object.entries(COLOR_GROUPS).forEach(([color, ids])=>{
    if(ids.every(id=>G.tileOwners[id]===p.idx)){
      ids.forEach(id=>{
        const tile = TILES[id];
        const builds = G.buildings[id]||0;
        if(builds < 5 && !G.mortgaged[id]){
          buildable.push({tile, builds});
        }
      });
    }
  });
  if(buildable.length===0 || G.turnPhase==='roll'){
    panel.style.display='none'; return;
  }
  panel.style.display='block';
  panel.innerHTML=`<div class="build-panel-title">🏗 Build (Full Set Owned)</div>`
  + buildable.map(({tile,builds})=>{
    const cost = tile.houseCost;
    const canAfford = p.gold >= cost;
    const pips = Array(5).fill(0).map((_,i)=>`<div class="bpr-pip ${i<builds?'on':''}"></div>`).join('');
    return `<div class="build-prop-row">
      <div class="bpr-name">${tile.name}</div>
      <div class="bpr-pips">${pips}</div>
      <button class="btn btn-gold btn-sm bpr-btn" onclick="buildOnTile(${tile.id})" ${canAfford?'':'disabled'} title="${BUILDING_NAMES[builds]||'Capital'}: ${cost}g">
        +${cost}g
      </button>
    </div>`;
  }).join('');
}

// PLAYER INFO MODAL (click player card to view holdings)

function showPlayerInfo(playerIdx){
  const p = G.players[playerIdx];
  if(!p) return;

  // Header
  const header = document.getElementById('pinfo-header');
  header.innerHTML=`
    <div style="width:44px;height:44px;border-radius:50%;background:${p.color};border:3px solid ${p.color}88;flex-shrink:0;box-shadow:0 0 18px ${p.color}66;"></div>
    <div>
      <div style="font-family:'Cinzel',serif;font-size:1.3rem;color:${p.color};font-weight:700;">${p.name}</div>
      <div style="font-size:0.9rem;color:var(--dim);">${p.bankrupt?'☠ Eliminated':p.inJail?`⛓ Jailed (${p.jailTurns}/3 turns)`:'Active Adventurer'}</div>
    </div>
    <div style="margin-left:auto;text-align:right;">
      <div style="font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold);">${p.gold}g</div>
      <div style="font-size:0.75rem;color:var(--dim);">treasury</div>
    </div>`;

  // Body
  const body = document.getElementById('pinfo-body');
  const owned = Object.entries(G.tileOwners)
    .filter(([,oi])=>oi===playerIdx)
    .map(([tid])=>TILES[+tid])
    .filter(Boolean)
    .sort((a,b)=>a.id-b.id);

  let html='';

  // Stats row
  html += `<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">`;
  html += `<div style="flex:1;min-width:90px;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.15);border-radius:8px;padding:10px;text-align:center;">
    <div style="font-size:1.1rem;font-family:'Cinzel',serif;color:var(--gold);">${owned.length}</div>
    <div style="font-size:0.72rem;color:var(--dim);">Properties</div></div>`;

  const totalRR = owned.filter(t=>t.type==='railroad').length;
  const totalUtil = owned.filter(t=>t.type==='utility').length;
  const totalBuildings = owned.reduce((s,t)=>(G.buildings[t.id]||0)+s, 0);
  const netWorth = p.gold + owned.reduce((s,t)=>s+Math.floor((G.tilePrices[t.id]||t.price||0)/2),0);

  html+=`<div style="flex:1;min-width:90px;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.15);border-radius:8px;padding:10px;text-align:center;">
    <div style="font-size:1.1rem;font-family:'Cinzel',serif;color:var(--gold);">${netWorth}g</div>
    <div style="font-size:0.72rem;color:var(--dim);">Est. Net Worth</div></div>`;
  html+=`<div style="flex:1;min-width:90px;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.15);border-radius:8px;padding:10px;text-align:center;">
    <div style="font-size:1.1rem;font-family:'Cinzel',serif;color:var(--gold);">${totalBuildings}</div>
    <div style="font-size:0.72rem;color:var(--dim);">Buildings</div></div>`;
  html+=`</div>`;

  // Gear & Potions
  if(p.gear||p.potions.length>0){
    html+=`<div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;">`;
    if(p.gear) html+=`<span class="tag gear-tag" style="font-size:0.8rem;">⚔ ${p.gear.name}</span>`;
    p.potions.forEach(pot=>{ html+=`<span class="tag potion-tag" style="font-size:0.8rem;">🧪 ${pot.name}</span>`; });
    html+=`</div>`;
  }

  // Properties by group
  if(owned.length===0){
    html+=`<div style="text-align:center;color:var(--dim);font-style:italic;padding:20px 0;">No properties yet — the adventure has just begun.</div>`;
  } else {
    // Group by color/type
    const groups={};
    owned.forEach(t=>{
      const key = t.color||t.type;
      if(!groups[key]) groups[key]=[];
      groups[key].push(t);
    });

    Object.entries(groups).forEach(([key,tiles])=>{
      const groupHex = COLOR_HEX[key]||'#555';
      const groupName = GROUP_NAMES[key]||(key==='railroad'?'Caravan Crossings':key==='utility'?'Utilities':key);
      const groupIcon = GROUP_ICONS[key]||(key==='railroad'?'🐪':key==='utility'?'⚗':'🏛');
      const totalInGroup = key==='railroad'?4:key==='utility'?2:(COLOR_GROUPS[key]?.length||0);
      const ownsAll = totalInGroup>0 && tiles.length>=totalInGroup;

      html+=`<div style="margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
          <div style="width:10px;height:10px;border-radius:2px;background:${groupHex};flex-shrink:0;"></div>
          <span style="font-family:'Cinzel',serif;font-size:0.78rem;color:${groupHex};letter-spacing:1px;">${groupIcon} ${groupName}</span>
          ${ownsAll?`<span style="font-size:0.7rem;color:#88ff88;background:rgba(136,255,136,0.1);border:1px solid #88ff8844;border-radius:10px;padding:1px 6px;">FULL SET ⚡</span>`:`<span style="font-size:0.7rem;color:var(--dim);">(${tiles.length}/${totalInGroup})</span>`}
        </div>`;

      tiles.forEach(t=>{
        const builds = G.buildings[t.id]||0;
        const rent = t.rent ? (builds>0?t.rent[builds]:ownsAll?t.rent[0]*2:t.rent[0]) : null;
        html+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,0.04);border-radius:6px;margin-bottom:4px;border-left:3px solid ${groupHex}44;">
          <div style="flex:1;font-size:0.85rem;">${t.name}</div>
          ${rent!==null?`<div style="font-size:0.75rem;color:var(--dim);">rent: <span style="color:var(--text)">${rent}g</span></div>`:''}
          ${builds>0?`<div style="font-size:0.72rem;color:#ffd700;">${BUILDING_NAMES[builds-1]||'Capital'}</div>`:''}
        </div>`;
      });
      html+=`</div>`;
    });
  }

  body.innerHTML = html;
  document.getElementById('player-info-modal').classList.remove('hidden');
}

function buildOnTile(tileId){
  const tile = TILES[tileId];
  const player = cur();
  const cost = tile.houseCost;
  const current = G.buildings[tileId]||0;
  if(current>=5||player.gold<cost) return;
  deductGold(player, cost, `building ${BUILDING_NAMES[current]||'Capital'} on ${tile.name}`);
  G.buildings[tileId] = current+1;
  updateBuildingPips(tileId);
  log(`${player.name} builds a ${BUILDING_NAMES[current]||'Capital'} on ${tile.name}!`,'success');
  renderPlayerCards();
  closeTileInfo();
}

// ═══════════════════════════════════════════════════════════
// TURN END & BANKRUPTCY
// ═══════════════════════════════════════════════════════════
function endTurn(){
  const p = cur();
  // Doubles bonus roll — complete tile actions first, THEN roll again
  if(G.doublesPending && !p.inJail && !p.bankrupt){
    G.doublesPending=false;
    log(`🎲 ${p.name} rolled doubles — bonus roll!`,'success');
    renderPlayerCards();
    renderTokens();
    document.getElementById('roll-btn').disabled=false;
    document.getElementById('turn-banner').textContent=`${p.name} — Roll Again (doubles)!`;
    refreshBuildPanel();
    return; // same player rolls again
  }
  G.doublesPending=false;
  G.doublesCount=0;
  renderPlayerCards();
  renderTokens();
  document.getElementById('roll-btn').disabled=false;
  // Next active player
  let next=(G.currentIdx+1)%G.players.length;
  let tries=0;
  while(G.players[next].bankrupt && tries<G.players.length){ next=(next+1)%G.players.length; tries++; }
  G.currentIdx=next;
  renderPlayerCards();
  startTurn(); // startTurn already calls refreshBuildPanel
}

function deductGold(player, amount, reason){
  if(typeof amount==='string') return; // guard against bad calls
  player.gold=Math.max(0, player.gold-amount);
  if(reason) log(`${player.name} pays ${amount}g (${reason})`,'danger');
  checkBankruptcy(player);
}

function checkBankruptcy(player){
  if(player.bankrupt) return;
  if(player.gold<=0){
    player.bankrupt=true;
    player.gold=0;
    // Release properties
    Object.keys(G.tileOwners).forEach(tid=>{ if(G.tileOwners[tid]===player.idx) delete G.tileOwners[tid]; });
    log(`💀 ${player.name} is BANKRUPT and eliminated from the realm!`,'danger');
    const remaining=G.players.filter(p=>!p.bankrupt);
    if(remaining.length===1){
      showWinner(remaining[0]);
    }
    renderPlayerCards();
  }
}

function showWinner(player){
  document.getElementById('win-title').textContent=`${player.name} WINS!`;
  document.getElementById('win-sub').textContent=`The realm bows before the new champion with ${player.gold}g in the treasury!`;
  document.getElementById('win-screen').style.display='flex';
}
